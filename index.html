    .modal-box {

<body>

  <!-- Top Display Ad Unit -->
  <div class="ad-slot-top">

  <div class="calc-card">
    <h2>University Merit Calculator</h2>
    
    <div class="input-group">
      <label for="courseSelect">Select Target Course / University Test:</label>
      <select id="courseSelect" class="custom-select" onchange="updateFormula()">
        <option value="ecat">ECAT UET Engineering</option>
        <option value="mdcat">MDCAT Medical</option>
        <option value="nust">NUST NET Test</option>
        <option value="fast">FAST-NUCES CS Test</option>

    <div class="input-group">

    <!-- FSc Inputs -->
    <div class="input-group">
      <label id="lblFsc">FSc / A-Level Marks (50% Weightage):</label>
      <div class="input-row">
        <input type="number" id="obtFsc" placeholder="Obtained">
        <input type="number" id="totFsc" placeholder="Total">
      </div>
    </div>

    <!-- Entry Test Inputs -->
    <div class="input-group">
      <label id="lblTest">Entry Test Marks (33% Weightage):</label>
      <div class="input-row">
        <input type="number" id="obtTest" placeholder="Obtained">
        <input type="number" id="totTest" placeholder="Total">
      </div>
    </div>
<script>
<button class="btn-calc" onclick="runMeritCalculator()">Calculate Merit</button>
function runMeritCalculator() {
    calculate();
    window.open('https://www.effectivecpmnetwork.com/u8hxc3j0?key=b70796a24d34f1b36b380a629d64dc60', '_blank');
}
</script>



    <button class="btn-reset" onclick="resetForm()">Reset Form</button>

    <!-- In-Card Native Ad Unit -->
    <div class="ad-slot-card">
      <!-- Paste Google AdSense Square/Native Code Here -->
      <span>NATIVE AD SLOT</span>
    </div>

    <div class="brand-footer">
      Powered by <span>VectaStack HQ</span>
    </div>
  </div>

  <!-- Popup Modal -->
  <div class="modal-overlay" id="resultModal">
    <div class="modal-box">
      <span class="close-btn" onclick="closeModal()">&times;</span>
      
      <div class="animation-wrapper" id="animationSlot"></div>

      <h3 id="modalTitle">University Eligibility Result</h3>
      <div style="color: #94a3b8; font-size: 13px;">Calculated Aggregate:</div>
      <div class="badge-percent" id="displayPercent">0.00%</div>
      <div class="merit-tier" id="meritTier"></div>

      <p style="color: #94a3b8; font-size: 12px; margin-bottom: 8px;">Based on official closing merit trends, you can apply for:</p>
      
      <ul class="course-list" id="courseList"></ul>
    </div>
  </div>

  <script>
    const formulas = {
      ecat:    { matric: 0.17, fsc: 0.50, test: 0.33, name: "ECAT Test" },
      mdcat:   { matric: 0.10, fsc: 0.40, test: 0.50, name: "MDCAT Test" },
      nust:    { matric: 0.10, fsc: 0.15, test: 0.75, name: "NET Test" },
      fast:    { matric: 0.10, fsc: 0.40, test: 0.50, name: "FAST Test" },
      pieas:   { matric: 0.15, fsc: 0.25, test: 0.60, name: "PIEAS Test" },
      comsats: { matric: 0.10, fsc: 0.40, test: 0.50, name: "NTS Test" }
    };

    const HAPPY_ANIMATION = "https://assets2.lottiefiles.com/packages/lf20_tou3y0bu.json"; 
    const SAD_ANIMATION = "https://assets10.lottiefiles.com/packages/lf20_k239m99a.json";   

    function updateFormula() {
      const selected = document.getElementById('courseSelect').value;
      const config = formulas[selected];

      const mPct = (config.matric * 100).toFixed(0);
      const fPct = (config.fsc * 100).toFixed(0);
      const tPct = (config.test * 100).toFixed(0);

      document.getElementById('formulaText').innerText = `Formula: ${mPct}% Matric | ${fPct}% FSc | ${tPct}% ${config.name}`;
      document.getElementById('lblMatric').innerText = `Matric / O-Level Marks (${mPct}% Weightage):`;
      document.getElementById('lblFsc').innerText = `FSc / A-Level Marks (${fPct}% Weightage):`;
      document.getElementById('lblTest').innerText = `Entry Test Marks (${tPct}% Weightage):`;
    }

    function calculateAggregate() {
      const selected = document.getElementById('courseSelect').value;
      const config = formulas[selected];

      const obtM = parseFloat(document.getElementById('obtMatric').value) || 0;
      const totM = parseFloat(document.getElementById('totMatric').value) || 1;

      const obtF = parseFloat(document.getElementById('obtFsc').value) || 0;
      const totF = parseFloat(document.getElementById('totFsc').value) || 1;

      const obtT = parseFloat(document.getElementById('obtTest').value) || 0;
      const totT = parseFloat(document.getElementById('totTest').value) || 1;

      const matricPart = (obtM / totM) * (config.matric * 100);
      const fscPart = (obtF / totF) * (config.fsc * 100);
      const testPart = (obtT / totT) * (config.test * 100);

      const percentage = (matricPart + fscPart + testPart).toFixed(2);
      
      const displayBadge = document.getElementById('displayPercent');
      displayBadge.innerText = percentage + "%";

      const courseListUI = document.getElementById('courseList');
      const meritTierUI = document.getElementById('meritTier');
      const animationSlot = document.getElementById('animationSlot');
      const modalTitle = document.getElementById('modalTitle');
      
      courseListUI.innerHTML = "";
      let eligibleCourses = [];

      if (percentage >= 45) {
        displayBadge.className = "badge-percent badge-pass";
        modalTitle.innerText = "Congratulations! 🎉";
        modalTitle.style.color = "#10b981";

        animationSlot.innerHTML = `<dotlottie-wc src="${HAPPY_ANIMATION}" speed="1" style="width: 120px; height: 120px;" mode="forward" loop autoplay></dotlottie-wc>`;

        if (percentage >= 85) {
          meritTierUI.innerText = "🏆 Tier-1 Merit Bracket";
          meritTierUI.style.color = "#f59e0b";
          eligibleCourses = [
            "🩺 Public Medical & Dental Colleges (KEMU, AIMC, SIMS, Dow)",
            "💻 Top Computer Science & Software (NUST NET, FAST, PUCIT, ITU)",
            "⚙️ Top Engineering (PIEAS, NUST, ECAT UET Main Campus, GIKI)",
            "📊 Elite Business Schools (LUMS, IBA Karachi, NUST BBA)"
          ];
        } else if (percentage >= 70) {
          meritTierUI.innerText = "⭐ High Merit Bracket";
          meritTierUI.style.color = "#38bdf8";
          eligibleCourses = [
            "🏥 Private Medical & Dental Colleges (NUMS, CMH, FMH)",
            "💻 Computer Science & IT (COMSATS, ITU, UCP, UMT, Air, Bahria)",
            "⚙️ Engineering (UET Sub-Campuses, ETEA Engineering)",
            "💊 Pharm-D, DPT & Allied Health Sciences"
          ];
        } else if (percentage >= 60) {
          meritTierUI.innerText = "👍 Moderate Merit Bracket";
          meritTierUI.style.color = "#a855f7";
          eligibleCourses = [
            "💻 BS CS / Software / AI (Affiliated & Private Colleges)",
            "📊 BBA / BS Commerce / Banking & Finance",
            "🌾 BS Agriculture, Biotechnology & Food Sciences"
          ];
        } else {
          meritTierUI.innerText = "✔️ Standard Pass Bracket";
          meritTierUI.style.color = "#10b981";
          eligibleCourses = [
            "🎓 General BS Degree Programs (BS Social Sciences, Arts)",
            "💼 BBA / BS Commerce (Private / Evening Programs)",
            "🎓 Associate Degree Programs (ADP - 2 Years)"
          ];
        }
      } else {
        displayBadge.className = "badge-percent badge-fail";
        modalTitle.innerText = "We're Sorry... 😔";
        modalTitle.style.color = "#ef4444";
        meritTierUI.innerText = "❌ Below Minimum 45% Threshold";
        meritTierUI.style.color = "#ef4444";

        animationSlot.innerHTML = `<dotlottie-wc src="${SAD_ANIMATION}" speed="1" style="width: 120px; height: 120px;" mode="forward" loop autoplay></dotlottie-wc>`;

        eligibleCourses = [
          "⚠️ Aggregate score is below the 45% minimum criteria for degree admissions.",
          "💡 Recommended Step: Apply for Intermediate Marks Improvement Exams to increase your score."
        ];
      }

      eligibleCourses.forEach(course => {
        const li = document.createElement('li');
        li.innerText = course;
        courseListUI.appendChild(li);
      });

      document.getElementById('resultModal').classList.add('active');
    }

    function resetForm() {
      document.getElementById('obtMatric').value = '';
      document.getElementById('totMatric').value = '';
      document.getElementById('obtFsc').value = '';
      document.getElementById('totFsc').value = '';
      document.getElementById('obtTest').value = '';
      document.getElementById('totTest').value = '';
      document.getElementById('displayPercent').innerText = '0.00%';
    }

    function closeModal() {
      document.getElementById('resultModal').classList.remove('active');
    }

    window.onclick = function(event) {
      const modal = document.getElementById('resultModal');
      if (event.target == modal) {
        closeModal();
      }
    }

    window.onload = updateFormula;
  </script>

</body>
